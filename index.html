<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026 Landing Page Design</title>
    <link rel="stylesheet" href="./styles/style.css">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- Fontawesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Star Header Section -->
    <header>
        <div class="container">
            <nav class="navbar display-flex">
                <div class="brand-log">
                    <img src="./assets/logo.png" alt="DevConf Logo">
                </div>
                <div class="menu-bar">
                    <ul class="display-flex">
                        <li><a href="#">Speakers</a></li>
                        <li><a href="#">Schedule</a></li>
                        <li><a href="#">Tracks</a></li>
                        <li><a href="#">Venue</a></li>
                        <li><a href="#">Blog</a></li>
                    </ul>
                </div>
                <div class="cta-btn">
                    <button class="primary-btn">Register Now</button>
                </div>
            </nav>
        </div>
        <!-- banner start-->
        <section class="banner bg-overly">
            <div class="container banner-wrap">
                <div class="banner-contents">
                    <h1>Code. <em>Connect</em>. Create</h1>
                    <p>Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three days of cutting-edge talks, hands-on workshops, and meaningful connections.</p>
                </div>
                <div class="cta-btn">
                    <button class="primary-btn">Register Now</button>
                </div>
            </div>
        </section>


    </header>
    <!-- End Header Section -->

</body>

</html>
